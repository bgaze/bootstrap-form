name: tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      # Testbench 10 targets Laravel 12 (PHP 8.2+); Testbench 11 targets Laravel 13 (PHP 8.3+).
      matrix:
        include:
          - { php: '8.2', testbench: '10.*' }
          - { php: '8.3', testbench: '10.*' }
          - { php: '8.4', testbench: '10.*' }
          - { php: '8.3', testbench: '11.*' }
          - { php: '8.4', testbench: '11.*' }

    name: PHP ${{ matrix.php }} - Testbench ${{ matrix.testbench }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring
          coverage: none

      - name: Install dependencies
        run: |
          composer require "orchestra/testbench:${{ matrix.testbench }}" --dev --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit

  static:
    runs-on: ubuntu-latest

    name: Static analysis (PHPStan + Pint)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction

      - name: Check code style (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (PHPStan)
        run: vendor/bin/phpstan analyse --no-progress
